version: v2
modules:
  - path: proto
lint:
  use:
    - STANDARD
  except:
    # Register takes a Handshake (a domain concept from docs/context.md), not a
    # generically-named RegisterRequest. Deliberate; keeps the wire vocabulary
    # aligned with the product glossary.
    - RPC_REQUEST_STANDARD_NAME
breaking:
  use:
    - FILE
